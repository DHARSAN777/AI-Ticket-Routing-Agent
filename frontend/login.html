<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ticket Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      padding: 40px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-header-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    
    .login-header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #1f2937;
      font-weight: 700;
    }
    
    .login-header p {
      margin: 8px 0 0 0;
      color: #6b7280;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .success-message {
      background: #d1fae5;
      border: 1px solid #059669;
      color: #059669;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: center;
      display: none;
    }

    .info-text {
      color: #6b7280;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 15px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-header-icon">🎫</div>
      <h1>Ticket Agent</h1>
      <p>AI-Powered Support System</p>
    </div>

    <div id="emailStep">
      <form onsubmit="sendLoginEmail(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="login-btn" id="sendEmailBtn">📧 Send Login Link</button>
      </form>

      <div class="info-text">
        Enter your email address and we'll send you a secure login link
      </div>
    </div>

    <div class="success-message" id="successMessage">
      <strong>✅ Email Sent!</strong><br>
      Check your inbox for a login link.<br>
      <small>For demo purposes, you'll be logged in automatically in 3 seconds...</small>
    </div>
  </div>

  <script>
    function sendLoginEmail(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();

      if (!email) {
        alert('Please enter your email address');
        return;
      }

      // Show loading state
      const sendBtn = document.getElementById('sendEmailBtn');
      const originalText = sendBtn.textContent;
      sendBtn.textContent = '📤 Sending...';
      sendBtn.disabled = true;

      // Simulate email sending
      setTimeout(() => {
        // Hide email form and show success message
        document.getElementById('emailStep').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';

        // Simulate clicking email link after 3 seconds (for demo)
        setTimeout(() => {
          // Create user session
          const user = {
            email: email,
            name: email.split('@')[0] || 'User',
            loginMethod: 'email_link'
          };

          // Store user info
          sessionStorage.setItem('user', JSON.stringify(user));
          localStorage.setItem('access_token', 'email-token-' + Date.now());
          
          // Redirect to main app
          window.location.href = 'index.html';
        }, 3000);

      }, 1500); // 1.5 second delay to simulate sending
    }

    // If already logged in, redirect
    if (sessionStorage.getItem('user')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
